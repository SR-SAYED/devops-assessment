version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - "8080:8080"

    restart: unless-stopped

    networks:
      - devops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - devops-network

networks:
  devops-network:
    driver: bridge
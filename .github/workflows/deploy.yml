name: DevOps CI/CD Pipeline

on:
#  push:
#    branches:
#      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Backend Tests
        working-directory: backend
        run: |
          pytest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        run: |
          docker build -t backend ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Backend Image
        run: |
          docker tag backend:latest \
          ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.run_number }}

      - name: Tag Frontend Image
        run: |
          docker tag frontend:latest \
          ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.run_number }}

      - name: Push Backend Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.run_number }}

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true

      - name: Update Kubernetes manifests with image tag
        run: |
          sed -i "s|<ECR_URL>|${{ steps.login-ecr.outputs.registry }}|g" k8s/backend-deployment.yaml
          sed -i "s|<TAG>|${{ github.run_number }}|g" k8s/backend-deployment.yaml

          sed -i "s|<ECR_URL>|${{ steps.login-ecr.outputs.registry }}|g" k8s/frontend-deployment.yaml
          sed -i "s|<TAG>|${{ github.run_number }}|g" k8s/frontend-deployment.yaml

      - name: Configure Kubernetes access
        run: |
          aws eks update-kubeconfig --region ap-southeast-1 --name my-cluster

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/